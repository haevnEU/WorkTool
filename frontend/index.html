<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-g"/>
    <link href="/favicon.ico" rel="icon"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Internal Ops Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            DEFAULT: 'hsl(var(--primary-500))',
                            '50': 'hsl(var(--primary-50))',
                            '100': 'hsl(var(--primary-100))',
                            '200': 'hsl(var(--primary-200))',
                            '300': 'hsl(var(--primary-300))',
                            '400': 'hsl(var(--primary-400))',
                            '500': 'hsl(var(--primary-500))',
                            '600': 'hsl(var(--primary-600))',
                            '700': 'hsl(var(--primary-700))',
                            '800': 'hsl(var(--primary-800))',
                            '900': 'hsl(var(--primary-900))',
                        },
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer base {
            :root, [data-theme="light"] {
                --primary-50: 210 40% 95%;
                --primary-100: 210 40% 90%;
                --primary-200: 210 40% 80%;
                --primary-300: 210 40% 70%;
                --primary-400: 210 40% 60%;
                --primary-500: 210 40% 50%;
                --primary-600: 210 40% 40%;
                --primary-700: 210 40% 30%;
                --primary-800: 210 40% 20%;
                --primary-900: 210 40% 10%;
            }

            [data-theme="colorful"] {
                --primary-50: 320 70% 95%;
                --primary-100: 320 70% 90%;
                --primary-200: 320 70% 80%;
                --primary-300: 320 70% 70%;
                --primary-400: 320 70% 60%;
                --primary-500: 320 70% 55%;
                --primary-600: 320 70% 45%;
                --primary-700: 320 70% 35%;
                --primary-800: 320 70% 25%;
                --primary-900: 320 70% 15%;
            }

            [data-theme="ocean"] {
                --primary-50: 180 70% 95%;
                --primary-100: 180 70% 90%;
                --primary-200: 180 70% 80%;
                --primary-300: 180 70% 70%;
                --primary-400: 180 70% 60%;
                --primary-500: 180 70% 45%;
                --primary-600: 180 70% 35%;
                --primary-700: 180 70% 25%;
                --primary-800: 180 70% 15%;
                --primary-900: 180 70% 10%;
            }
        }
    </style>
    <script type="importmap">
        {
          "imports": {
            "react": "https://aistudiocdn.com/react@^19.2.0",
            "react/": "https://aistudiocdn.com/react@^19.2.0/",
            "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
            "lucide-react": "https://aistudiocdn.com/lucide-react@^0.552.0",
            "react-router-dom": "https://aistudiocdn.com/react-router-dom@^7.9.5",
            "react-syntax-highlighter": "https://esm.sh/react-syntax-highlighter@15.5.0",
            "react-syntax-highlighter/dist/esm/styles/prism": "https://esm.sh/react-syntax-highlighter@15.5.0/dist/esm/styles/prism",
            "react-syntax-highlighter/": "https://aistudiocdn.com/react-syntax-highlighter@^16.1.0/"
          }
        }
    </script>
    <link href="/index.css" rel="stylesheet">
</head>
<body class="bg-gray-100 dark:bg-gray-900">
<div id="root"></div>
<script src="/index.tsx" type="module"></script>
</body>
</html>
