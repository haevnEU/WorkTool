user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout  65;

    # --- Rate Limiting (Optional für Dev, gut für Prod) ---
    map $request_method $limit_key {
        default $binary_remote_addr;
        OPTIONS "";
    }
    limit_req_zone $limit_key zone=api_limit:10m rate=10r/s;

    # --- WebSocket Helper für Vite HMR ---
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # SSL Settings
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 1. HTTP auf HTTPS umleiten
    server {
        listen 80;
        server_name localhost;
        return 301 https://$host$request_uri;
    }

    # 2. HTTPS Server
    server {
        listen 443 ssl;
        # http2 entfernt, da es bei self-signed certs in manchen Browsern/Tools lokal Probleme machen kann
        # falls es stabil läuft, kannst du "listen 443 ssl http2;" wieder nutzen.

        server_name localhost;

        ssl_certificate     /etc/ssl/certs/selfsigned.crt;
        ssl_certificate_key /etc/ssl/private/selfsigned.key;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        client_max_body_size 2048M;

        # --- BACKEND API ---
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            limit_req_status 429;

            # WICHTIG: Port 8080 ist Standard für Spring Boot/Tomcat
            proxy_pass http://backend:8080/api/;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts für lange Requests
            proxy_connect_timeout 10s;
            proxy_read_timeout 90s;

            # CORS Preflight Handling (Falls Nginx das machen soll)
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' "$http_origin" always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS, PATCH' always;
                add_header 'Access-Control-Allow-Headers' 'Authorization,Content-Type,Accept,Origin,User-Agent,DNT,Cache-Control,X-Mx-ReqToken,Keep-Alive,X-Requested-With,If-Modified-Since' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Content-Length' 0;
                add_header 'Content-Type' 'text/plain charset=UTF-8';
                return 204;
            }
        }

        # --- FRONTEND (Vite Dev Server) ---
        location / {
            # WICHTIG: Hier muss Port 3000 stehen (nicht 80)!
            # Das Dockerfile exposet Port 3000 für Vite.
            proxy_pass http://frontend:3000;

            # WebSocket Support (Zwingend nötig für Hot Reloading)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Wichtig damit Vite weiß, dass es über HTTPS läuft
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 120s;
            proxy_buffering off;
        }
    }
}